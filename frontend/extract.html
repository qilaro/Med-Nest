<!DOCTYPE html>
<html>
<body>
<script>
var all = JSON.parse(localStorage.getItem('mx') || '{}');
var a = document.createElement('a');
a.href = URL.createObjectURL(new Blob([JSON.stringify(Object.values(all), null, 2)], {type: 'application/json'}));
a.download = 'medex.json';
document.body.appendChild(a);
a.click();
document.body.innerHTML = '<h2>Downloaded ' + Object.keys(all).length + ' generics</h2>';
</script>
</body>
</html>
